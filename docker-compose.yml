services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${MSSQL_SA_PASSWORD}' -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 20s # Aumentamos el intervalo
      timeout: 10s # Damos más tiempo de respuesta
      retries: 10 # Aumentamos los reintentos
    volumes:
      - mssql_data:/var/opt/mssql # Persistencia de datos

  backend:
    build: .
    container_name: aspnet_backend
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=inventarioLaboratorio;MultipleActiveResultSets=true;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Frontend__Url=${FRONTEND_URL}
    volumes:
      - fotosInventario:/app/wwwroot/imagenes

volumes:
  mssql_data:
  fotosInventario:
